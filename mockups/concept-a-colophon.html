<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>nhi</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../design_system/colors_and_type.css">
  <style>
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      padding: 56px var(--gutter) 32px;
      gap: var(--s-10);
    }
    .topmark {
      font-family: var(--font-mono);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--bone-3);
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .topmark::before {
      content: "·";
      color: var(--ember);
    }
    .video-stamp {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--ink-2);
      position: relative;
      overflow: hidden;
    }
    .video-stamp video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-stamp::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 30%;
      background: linear-gradient(to top, var(--ink), transparent);
      pointer-events: none;
    }
    .video-eyebrow {
      position: absolute;
      left: var(--s-4);
      bottom: var(--s-4);
      font-family: var(--font-mono);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--bone);
      z-index: 2;
    }
    .video-eyebrow .red { color: var(--ember); }
    .wordmark {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 92px;
      line-height: 0.9;
      color: var(--bone);
      margin: 0;
    }
    .tagline {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 19px;
      line-height: 1.35;
      color: var(--bone-2);
      margin-top: var(--s-3);
    }
    .tagline .red { color: var(--ember); }
    .rule {
      height: 1px;
      background: var(--hairline);
      width: 100%;
    }
    .links {
      display: flex;
      flex-direction: column;
    }
    .link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--s-5) 0;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: var(--tr-mono);
      text-transform: uppercase;
      color: var(--bone);
      text-decoration: none;
      border-bottom: 1px solid var(--hairline);
      transition: color var(--dur-base) var(--ease-out);
    }
    .link:last-child { border-bottom: 0; }
    .link .arrow { color: var(--bone-3); }
    .link:hover { color: var(--ember); }
    .link:hover .arrow { color: var(--ember); }
    .footer {
      margin-top: auto;
      padding-top: var(--s-8);
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: var(--fs-meta);
      letter-spacing: var(--tr-mono);
      text-transform: uppercase;
      color: var(--bone-4);
    }
  </style>
</head>
<body>
  <div class="topmark">nhi · transmissions</div>

  <div class="video-stamp">
    <video src="../design_system/assets/burning_tree_30s_60fps.mp4"
           autoplay muted loop playsinline
           poster="../design_system/assets/the-gamut.jpg"></video>
    <div class="video-eyebrow"><span class="red">new</span> · burning tree</div>
  </div>

  <div>
    <div class="wordmark">nhi</div>
    <div class="tagline">the signal precedes the song<span class="red">.</span></div>
  </div>

  <div class="links">
    <a class="link" href="#"><span>spotify</span><span class="arrow">→</span></a>
    <a class="link" href="#"><span>soundcloud</span><span class="arrow">→</span></a>
    <a class="link" href="#"><span>bandcamp</span><span class="arrow">→</span></a>
    <a class="link" href="#"><span>instagram</span><span class="arrow">→</span></a>
  </div>

  <div class="footer">
    <span>austin · tx</span>
    <span>mmxxvi</span>
  </div>
</body>
</html>
