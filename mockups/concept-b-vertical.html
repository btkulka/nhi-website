<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>nhi</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../design_system/colors_and_type.css">
  <style>
    html, body { height: 100%; }
    body {
      display: grid;
      grid-template-columns: 110px 1fr;
      grid-template-rows: 1fr auto;
      padding: 56px var(--gutter) 32px;
      column-gap: var(--s-5);
      row-gap: var(--s-10);
    }
    .stack {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0;
    }
    .stack .letter {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 132px;
      line-height: 0.85;
      letter-spacing: -0.02em;
      color: var(--bone);
    }
    .stack .letter.red { color: var(--ember); }
    .stack .index {
      margin-top: auto;
      font-family: var(--font-mono);
      font-size: var(--fs-meta);
      letter-spacing: var(--tr-mono);
      text-transform: uppercase;
      color: var(--bone-4);
    }
    .right {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      gap: var(--s-6);
    }
    .video-strip {
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: 320px;
      overflow: hidden;
      background: var(--ink-2);
      position: relative;
    }
    .video-strip video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-strip .label {
      position: absolute;
      left: var(--s-3);
      bottom: var(--s-3);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--bone);
    }
    .video-strip .label .red { color: var(--ember); }
    .tagline {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.35;
      color: var(--bone-2);
    }
    .tagline .red { color: var(--ember); }
    .links {
      display: flex;
      flex-direction: column;
      gap: var(--s-4);
    }
    .link {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      gap: var(--s-3);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: var(--tr-mono);
      text-transform: uppercase;
      color: var(--bone);
      text-decoration: none;
      transition: color var(--dur-base) var(--ease-out);
    }
    .link .icon {
      width: 16px;
      height: 16px;
      color: var(--bone-2);
      transition: color var(--dur-base) var(--ease-out);
      display: block;
    }
    .link .leader {
      color: var(--bone-4);
      letter-spacing: 0.1em;
      font-size: 11px;
    }
    .link:hover { color: var(--ember); }
    .link:hover .icon { color: var(--ember); }
    .link:hover .leader { color: var(--ember); }
    .footer {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: var(--fs-meta);
      letter-spacing: var(--tr-mono);
      text-transform: uppercase;
      color: var(--bone-4);
    }
  </style>
</head>
<body>
  <div class="stack">
    <div class="letter">n</div>
    <div class="letter red">h</div>
    <div class="letter">i</div>
    <div class="index">austin</div>
  </div>

  <div class="right">
    <div class="video-strip">
      <video src="../design_system/assets/burning_tree_30s_60fps.mp4"
             autoplay muted loop playsinline
             poster="../design_system/assets/the-gamut.jpg"></video>
      <div class="label"><span class="red">new</span> · burning tree</div>
    </div>

    <div class="tagline">the signal precedes the song<span class="red">.</span></div>
