<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>nhi · concept mockups</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../design_system/colors_and_type.css">
  <style>
    body {
      background: #1c1916;
      margin: 0;
      padding: 32px 16px 64px;
      min-height: 100vh;
      font-family: var(--font-body);
    }
    h1 {
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: 13px;
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--bone-3);
      margin: 0 0 32px;
      text-align: center;
    }
    .grid {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }
    .frame {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--bone-3);
    }
    .label .strong { color: var(--bone); }
    iframe {
      width: 390px;
      height: 844px;
      border: 0;
      background: var(--ink);
      border-radius: 32px;
      box-shadow: 0 40px 100px -30px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <h1>nhi · v1 concepts · burning tree single</h1>
  <div class="grid">
    <div class="frame">
      <div class="label"><span class="strong">A</span> · colophon</div>
      <iframe src="concept-a-colophon.html" title="Concept A"></iframe>
    </div>
    <div class="frame">
      <div class="label"><span class="strong">B</span> · vertical wordmark</div>
      <iframe src="concept-b-vertical.html" title="Concept B"></iframe>
    </div>
    <div class="frame">
      <div class="label"><span class="strong">C</span> · signal pulse</div>
      <iframe src="concept-c-signal.html" title="Concept C"></iframe>
    </div>
  </div>
</body>
</html>
