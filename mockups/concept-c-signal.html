<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>nhi</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../design_system/colors_and_type.css">
  <style>
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      padding: 24px var(--gutter) 24px;
      gap: var(--s-8);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .topbar .mark {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 28px;
      color: var(--bone);
      line-height: 1;
    }
    .topbar .meta {
      font-family: var(--font-mono);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--bone-3);
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .topbar .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--ember);
      animation: pulse 2.4s var(--ease-in-out) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    .video {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: var(--ink-2);
      position: relative;
      overflow: hidden;
    }
    .video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 35%;
      background: linear-gradient(to top, var(--ink) 5%, transparent);
      pointer-events: none;
    }
    .video-meta {
      position: absolute;
      left: 0; right: 0; bottom: var(--s-5);
      padding: 0 var(--s-5);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--font-mono);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--bone);
      z-index: 2;
    }
    .video-meta .title {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--bone);
    }
    .video-meta .red { color: var(--ember); }
    .tagline {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 21px;
      line-height: 1.35;
      color: var(--bone-2);
      max-width: 280px;
    }
    .tagline .red { color: var(--ember); }
    .links {
      display: flex;
      flex-direction: column;
      gap: var(--s-3);
    }
    .link {
      display: flex;
      align-items: baseline;
      gap: var(--s-3);
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: var(--tr-mono);
      text-transform: uppercase;
      color: var(--bone);
      text-decoration: none;
      padding: var(--s-2) 0;
      transition: color var(--dur-base) var(--ease-out), padding-left var(--dur-base) var(--ease-out);
    }
    .link .dash {
      color: var(--bone-4);
      letter-spacing: 0;
    }
    .link:hover { color: var(--ember); padding-left: 4px; }
    .link:hover .dash { color: var(--ember); }
    .footer {
      margin-top: auto;
      padding-top: var(--s-6);
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: var(--fs-meta);
      letter-spacing: var(--tr-mono);
      text-transform: uppercase;
      color: var(--bone-4);
    }
    .footer .red { color: var(--ember); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="mark">nhi</div>
    <div class="meta"><span class="dot"></span><span>broadcasting</span></div>
  </div>

  <div class="video">
    <video src="../design_system/assets/burning_tree_30s_60fps.mp4"
           autoplay muted loop playsinline
           poster="../design_system/assets/the-gamut.jpg"></video>
    <div class="video-meta">
      <span><span class="red">new</span> · single · 4:32</span>
      <span class="title">burning tree</span>
    </div>
  </div>

  <div class="tagline">the signal precedes the song<span class="red">.</span></div>

  <div class="links">
    <a class="link" href="#"><span class="dash">——</span><span>spotify</span></a>
    <a class="link" href="#"><span class="dash">——</span><span>soundcloud</span></a>
    <a class="link" href="#"><span class="dash">——</span><span>bandcamp</span></a>
    <a class="link" href="#"><span class="dash">——</span><span>instagram</span></a>
  </div>

  <div class="footer">
    <span>lat 30.2672 <span class="red">·</span> lon −97.7431</span>
    <span>austin · tx</span>
  </div>
</body>
</html>
