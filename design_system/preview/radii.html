<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <span class="label">radii — sharp by default</span>
  <div style="display:flex;gap:24px;align-items:flex-end">
    <div style="text-align:center"><div style="width:60px;height:60px;background:var(--ink-2);border:1px solid var(--hairline);border-radius:0"></div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--bone-3);margin-top:8px">r-0 · default</div></div>
    <div style="text-align:center"><div style="width:60px;height:60px;background:var(--ink-2);border:1px solid var(--hairline);border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--bone-3);margin-top:8px">r-1 · 2px</div></div>
    <div style="text-align:center"><div style="width:60px;height:60px;background:var(--ink-2);border:1px solid var(--hairline);border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--bone-3);margin-top:8px">r-2 · 4px</div></div>
    <div style="text-align:center"><div style="width:60px;height:24px;background:var(--ink-2);border:1px solid var(--hairline);border-radius:999px"></div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--bone-3);margin-top:8px">pill · scrub</div></div>
  </div>
</div>
</body></html>
