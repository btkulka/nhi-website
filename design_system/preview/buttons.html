<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:32px 36px;gap:28px">
  <span class="label">buttons — gold-led</span>

  <div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">

    <button style="background:var(--ash-gold);color:var(--ink);border:0;padding:16px 36px;font-family:var(--font-mono);font-weight:500;font-size:11px;letter-spacing:0.28em;text-transform:uppercase;cursor:pointer;line-height:1">
      <span style="display:inline-flex;align-items:center;gap:14px"><span>listen</span>
      <svg width="18" height="6" viewBox="0 0 18 6" fill="none"><path d="M0 3H17M14 0L17 3L14 6" stroke="currentColor" stroke-width="1"/></svg></span>
    </button>

    <button style="background:transparent;color:var(--ash-gold);border:1px solid var(--ash-gold);padding:15px 35px;font-family:var(--font-mono);font-weight:400;font-size:11px;letter-spacing:0.28em;text-transform:uppercase;cursor:pointer;line-height:1">subscribe</button>

    <button style="background:transparent;color:var(--ember);border:1px solid var(--ember);padding:15px 35px;font-family:var(--font-mono);font-weight:500;font-size:11px;letter-spacing:0.28em;text-transform:uppercase;cursor:pointer;line-height:1">tickets</button>

    <span style="display:inline-flex;align-items:flex-end;gap:10px;font-family:var(--font-mono);font-weight:500;font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ash-gold);padding-bottom:6px;border-bottom:1px solid var(--ash-gold);cursor:pointer;line-height:1">
      read more
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M2 7L7 2M7 2H3M7 2V6" stroke="currentColor" stroke-width="1"/></svg>
    </span>

    <span style="font-family:var(--font-mono);font-weight:400;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--bone-3);cursor:pointer;line-height:1;display:inline-flex;align-items:center;gap:8px">tour
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M2 7L7 2M7 2H3M7 2V6" stroke="currentColor" stroke-width="1"/></svg>
    </span>
  </div>

  <div style="height:1px;background:var(--hairline)"></div>

  <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:10px">
      <span style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--bone-4)">rest</span>
      <button style="background:var(--ash-gold);color:var(--ink);border:0;padding:14px 28px;font-family:var(--font-mono);font-weight:500;font-size:10px;letter-spacing:0.28em;text-transform:uppercase;line-height:1">listen</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <span style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--bone-4)">hover</span>
      <button style="background:#a88440;color:var(--ink);border:0;padding:14px 28px;font-family:var(--font-mono);font-weight:500;font-size:10px;letter-spacing:0.28em;text-transform:uppercase;line-height:1">listen</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <span style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--bone-4)">press</span>
      <button style="background:#8d6e34;color:var(--ink);border:0;padding:14px 28px;font-family:var(--font-mono);font-weight:500;font-size:10px;letter-spacing:0.28em;text-transform:uppercase;line-height:1;transform:scale(0.97)">listen</button>
    </div>
    <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--bone-4);max-width:200px;line-height:1.6">gold primary · gold outline · crimson reserved for ticket / urgency</div>
  </div>
</div>
</body></html>
