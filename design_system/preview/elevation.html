<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <span class="label">elevation — atmosphere over shadow</span>
  <div style="display:flex;gap:20px;align-items:center">
    <div style="text-align:center">
      <div style="width:120px;height:80px;background:var(--ink-2);border:1px solid var(--hairline)"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--bone-3);margin-top:8px">flat · default</div>
    </div>
    <div style="text-align:center">
      <div style="width:120px;height:80px;background:var(--ink-2);box-shadow:0 12px 32px -12px rgba(0,0,0,0.6)"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--bone-3);margin-top:8px">sheet · modal only</div>
    </div>
    <div style="text-align:center;position:relative;width:140px;height:96px;overflow:hidden;background:linear-gradient(135deg,#3a1410,#0a0908)">
      <div style="position:absolute;left:0;right:0;bottom:0;height:60%;background:linear-gradient(180deg,transparent,#0a0908)"></div>
      <div style="position:absolute;left:8px;bottom:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--bone)">bone over scrim</div>
    </div>
  </div>
</div>
</body></html>
