<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <span class="label">show row — divider, never wrap</span>
  <div style="max-width:520px">
    <div style="display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--hairline)">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;color:var(--bone-3)">04.18.26</span>
      <div><div style="font-family:var(--font-display);font-style:italic;font-weight:300;font-size:22px;color:var(--bone);line-height:1.1">at the rosewood</div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--bone-3);margin-top:4px">austin, tx</div></div>
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--bone)">tickets ↗</span>
    </div>
    <div style="display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--hairline)">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;color:var(--bone-3)">05.04.26</span>
      <div><div style="font-family:var(--font-display);font-style:italic;font-weight:300;font-size:22px;color:var(--bone);line-height:1.1">empire control room</div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--bone-3);margin-top:4px">austin, tx</div></div>
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--bone-4)">sold out</span>
    </div>
    <div style="display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:baseline;padding:18px 0">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;color:var(--bone-3)">06.21.26</span>
      <div><div style="font-family:var(--font-display);font-style:italic;font-weight:300;font-size:22px;color:var(--bone);line-height:1.1">marfa myths</div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--bone-3);margin-top:4px">marfa, tx</div></div>
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--bone)">tickets ↗</span>
    </div>
  </div>
</div>
</body></html>
