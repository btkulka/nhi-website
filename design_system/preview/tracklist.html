<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <span class="label">tracklist — credits row</span>
  <div style="max-width:480px">
    <div style="display:grid;grid-template-columns:32px 1fr auto;gap:14px;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--hairline)">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--ember)">01</span>
      <span style="font-family:var(--font-display);font-style:italic;font-weight:300;font-size:18px;color:var(--bone)">burning tree <span style="display:inline-block;width:5px;height:5px;background:var(--ember);border-radius:999px;margin-left:8px;vertical-align:middle"></span></span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3);letter-spacing:0.04em">4:32</span>
    </div>
    <div style="display:grid;grid-template-columns:32px 1fr auto;gap:14px;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--hairline)">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-3)">02</span>
      <span style="font-family:var(--font-display);font-style:italic;font-weight:300;font-size:18px;color:var(--bone-2)">the gamut</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3);letter-spacing:0.04em">5:18</span>
    </div>
    <div style="display:grid;grid-template-columns:32px 1fr auto;gap:14px;align-items:baseline;padding:12px 0">
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-3)">03</span>
      <span style="font-family:var(--font-display);font-style:italic;font-weight:300;font-size:18px;color:var(--bone-2)">dissolve</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3);letter-spacing:0.04em">3:47</span>
    </div>
  </div>
</div>
</body></html>
