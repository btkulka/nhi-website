<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <span class="label">spacing — 4px base</span>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:14px"><div style="width:4px;height:14px;background:var(--bone)"></div><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-2);width:50px">s-1</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3)">4px · hairline pad</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:8px;height:14px;background:var(--bone)"></div><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-2);width:50px">s-2</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3)">8px · inline gaps</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:16px;height:14px;background:var(--bone)"></div><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-2);width:50px">s-4</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3)">16px · row padding</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:20px;height:14px;background:var(--bone)"></div><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-2);width:50px">s-5</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3)">20px · gutter</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:32px;height:14px;background:var(--bone)"></div><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-2);width:50px">s-8</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3)">32px · stack break</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:64px;height:14px;background:var(--bone)"></div><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-2);width:50px">s-16</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3)">64px · section gap</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:96px;height:14px;background:var(--bone)"></div><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;color:var(--bone-2);width:50px">s-24</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--bone-3)">96px · breath</span></div>
  </div>
</div>
</body></html>
