<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div>
    <span class="label">semantic tokens</span>
    <table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px;color:var(--bone-2);letter-spacing:0.04em">
      <tr style="border-bottom:1px solid var(--hairline)"><td style="padding:8px 0;color:var(--bone)">--bg</td><td><span style="display:inline-block;width:14px;height:14px;background:#0a0908;border:1px solid var(--hairline);vertical-align:middle"></span> ink</td><td style="color:var(--bone-3)">page background</td></tr>
      <tr style="border-bottom:1px solid var(--hairline)"><td style="padding:8px 0;color:var(--bone)">--bg-elevated</td><td><span style="display:inline-block;width:14px;height:14px;background:#141210;border:1px solid var(--hairline);vertical-align:middle"></span> ink-2</td><td style="color:var(--bone-3)">sheets, modals</td></tr>
      <tr style="border-bottom:1px solid var(--hairline)"><td style="padding:8px 0;color:var(--bone)">--fg</td><td><span style="display:inline-block;width:14px;height:14px;background:#f1ece1;vertical-align:middle"></span> bone</td><td style="color:var(--bone-3)">primary text</td></tr>
      <tr style="border-bottom:1px solid var(--hairline)"><td style="padding:8px 0;color:var(--bone)">--fg-muted</td><td><span style="display:inline-block;width:14px;height:14px;background:#8a8478;vertical-align:middle"></span> bone-3</td><td style="color:var(--bone-3)">metadata, captions</td></tr>
      <tr style="border-bottom:1px solid var(--hairline)"><td style="padding:8px 0;color:var(--bone)">--accent</td><td><span style="display:inline-block;width:14px;height:14px;background:#c93829;vertical-align:middle"></span> ember</td><td style="color:var(--bone-3)">single mark per screen</td></tr>
      <tr><td style="padding:8px 0;color:var(--bone)">--border</td><td><span style="display:inline-block;width:14px;height:14px;background:rgba(241,236,225,0.10);vertical-align:middle;border:1px solid var(--hairline)"></span> hairline</td><td style="color:var(--bone-3)">10% bone, never wraps</td></tr>
    </table>
  </div>
</div>
</body></html>
