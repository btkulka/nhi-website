<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <span class="label">form fields</span>
  <div style="display:flex;flex-direction:column;gap:14px;max-width:420px">
    <div style="border-bottom:1px solid var(--hairline);padding:10px 0;display:flex;align-items:baseline;gap:12px">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--bone-3);width:64px">email</span>
      <input value="signal@nhi.audio" style="flex:1;background:transparent;border:0;outline:0;color:var(--bone);font-family:var(--font-body);font-weight:300;font-size:15px;letter-spacing:-0.01em" />
    </div>
    <div style="border-bottom:1px solid var(--ember);padding:10px 0;display:flex;align-items:baseline;gap:12px">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ember);width:64px">focus</span>
      <span style="flex:1;color:var(--bone);font-family:var(--font-body);font-weight:300;font-size:15px">austin, tx</span>
    </div>
    <div style="border-bottom:1px solid var(--hairline);padding:10px 0;display:flex;align-items:baseline;gap:12px;opacity:0.5">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--bone-3);width:64px">empty</span>
      <span style="flex:1;color:var(--bone-4);font-family:var(--font-body);font-weight:300;font-size:15px;font-style:italic">—</span>
    </div>
  </div>
</div>
</body></html>
